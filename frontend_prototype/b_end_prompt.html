<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- DNS预解析加速 -->
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业级 NL2SQL 平台 - Prompt 模板管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --sky-blue: #4BA3E3; --bg-light: #F8FAFC; }
            --font-sans: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
        body { font-family: var(--font-sans); background-color: var(--bg-light); color: #333; }
        .code-font { font-family: var(--font-mono); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .deerflow-badge { position: fixed; bottom: 20px; right: 20px; font-size: 12px; color: #94a3b8; text-decoration: none; transition: all 0.3s ease; background: rgba(255,255,255,0.6); padding: 4px 10px; border-radius: 20px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.4); z-index: 1000; }
        .deerflow-badge:hover { color: var(--sky-blue); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(75, 163, 227, 0.15); }
        .modal-backdrop { background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="h-screen flex overflow-hidden" x-data="promptApp()">

    <!-- Toast -->
    <div x-show="toast.show" x-transition class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-4 py-2 rounded-full shadow-lg border text-sm font-medium"
         :class="{ 'bg-green-50 border-green-200 text-green-700': toast.type === 'success', 'bg-blue-50 border-blue-200 text-blue-700': toast.type === 'info' }" style="display: none;">
        <i class="fas" :class="{ 'fa-check-circle': toast.type === 'success', 'fa-info-circle': toast.type === 'info' }"></i>
        <span x-text="toast.message"></span>
    </div>

    <!-- Version History Modal -->
    <div x-show="showVersionModal" class="fixed inset-0 z-50 flex items-center justify-center modal-backdrop p-4" x-transition.opacity style="display: none;">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden" @click.away="showVersionModal = false">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800">版本历史 - <span class="text-sky-600 font-mono" x-text="currentTemplate?.name"></span></h3>
                <button @click="showVersionModal = false" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 max-h-96 overflow-y-auto">
                <div class="space-y-3">
                    <template x-for="v in versions" :key="v.version">
                        <div class="flex items-center justify-between p-3 rounded-lg border" :class="v.isActive ? 'border-sky-300 bg-sky-50' : 'border-gray-200 hover:bg-slate-50'">
                            <div class="flex items-center gap-3">
                                <span class="px-2 py-0.5 text-xs font-mono rounded" :class="v.isActive ? 'bg-sky-500 text-white' : 'bg-slate-100 text-slate-600'" x-text="'v' + v.version"></span>
                                <div>
                                    <div class="text-sm font-medium text-slate-700" x-text="v.isActive ? '当前激活版本' : '历史版本'"></div>
                                    <div class="text-xs text-slate-400" x-text="v.time + ' / ' + v.author"></div>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button @click="viewVersion(v)" class="text-xs px-3 py-1.5 border border-gray-200 rounded hover:bg-slate-100 text-slate-600">查看</button>
                                <button x-show="!v.isActive" @click="rollbackVersion(v)" class="text-xs px-3 py-1.5 border border-sky-200 rounded hover:bg-sky-50 text-sky-600">回滚</button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin Sidebar -->
    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col z-20 shadow-xl hidden md:flex flex-shrink-0">
        <div class="h-16 flex items-center justify-center gap-3 border-b border-slate-800">
            <div class="w-8 h-8 rounded-lg bg-sky-500 flex items-center justify-center text-white font-bold"><i class="fas fa-server"></i></div>
            <h1 class="font-bold text-lg text-white tracking-tight">管理工作台</h1>
        </div>
        <div class="p-4 flex-1 overflow-y-auto">
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 px-2">系统配置</div>
            <nav class="space-y-1 mb-8">
                <a href="b_end_dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm transition-colors"><i class="fas fa-database w-5 text-center"></i> 数据源与知识库</a>
                <a href="b_end_roles.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm transition-colors"><i class="fas fa-shield-alt w-5 text-center"></i> 权限与角色</a>
                <a href="b_end_prompt.html" class="flex items-center gap-3 px-3 py-2.5 bg-sky-500/10 text-sky-400 rounded-lg text-sm font-medium border border-sky-500/20"><i class="fas fa-code w-5 text-center"></i> Prompt 模板</a>
            </nav>
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 px-2">治理引擎</div>
            <nav class="space-y-1 mb-8">
                <a href="b_end_governance.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm transition-colors"><i class="fas fa-tags w-5 text-center"></i> Tag 与血缘治理</a>
            </nav>
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3 px-2">审计与监控</div>
            <nav class="space-y-1">
                <a href="b_end_audit.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm transition-colors"><i class="fas fa-history w-5 text-center"></i> 查询审计日志</a>
                <a href="b_end_cost.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-slate-200 hover:bg-slate-800 rounded-lg text-sm transition-colors"><i class="fas fa-chart-line w-5 text-center"></i> 成本监控</a>
            </nav>
        </div>
        <div class="p-4 border-t border-slate-800 flex items-center gap-3 cursor-pointer hover:bg-slate-800 transition-colors">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" class="w-8 h-8 rounded-full bg-slate-700">
            <div class="flex-1 min-w-0"><p class="text-sm font-medium text-white">Admin</p><p class="text-xs text-slate-500">超级管理员</p></div>
            <i class="fas fa-sign-out-alt text-slate-500 hover:text-red-400"></i>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-slate-50 relative overflow-hidden min-w-0">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-8 z-10 shadow-sm flex-shrink-0">
            <div class="flex items-center gap-2 text-sm text-slate-500">
                <a href="index.html" class="hover:text-sky-500"><i class="fas fa-home"></i></a>
                <i class="fas fa-chevron-right text-xs"></i>
                <span class="font-medium text-slate-800">Prompt 模板管理</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="index.html" class="px-4 py-1.5 bg-sky-50 text-sky-600 rounded-md border border-sky-200 text-sm font-medium hover:bg-sky-100 transition-colors flex items-center gap-1"><i class="fas fa-desktop text-xs"></i> 返回员工端</a>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 md:p-6">
            <div class="max-w-[1400px] mx-auto grid grid-cols-1 xl:grid-cols-12 gap-6 min-h-[700px]">
                <!-- Left: Template List -->
                <div class="col-span-1 xl:col-span-3">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                        <h2 class="font-bold text-slate-800 text-lg mb-4">Prompt 模板</h2>
                        <div class="space-y-2">
                            <template x-for="tpl in templates" :key="tpl.id">
                                <div @click="selectTemplate(tpl.id)" class="p-3 rounded-lg cursor-pointer transition-all duration-200"
                                     :class="currentId === tpl.id ? 'border-2 border-sky-400 bg-sky-50 shadow-sm' : 'border border-slate-200 bg-slate-50 hover:bg-slate-100'">
                                    <div class="flex items-center justify-between mb-1">
                                        <span class="font-medium text-sm text-slate-800" x-text="tpl.name"></span>
                                        <span class="px-1.5 py-0.5 text-[10px] rounded bg-green-100 text-green-700 font-mono" x-text="'v' + tpl.version"></span>
                                    </div>
                                    <p class="text-xs text-slate-500" x-text="tpl.desc"></p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- Right: Editor -->
                <div class="col-span-1 xl:col-span-9 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col min-h-[600px] overflow-hidden">
                    <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between bg-slate-50">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded bg-purple-100 text-purple-500 flex items-center justify-center"><i class="fas fa-code text-lg"></i></div>
                            <div>
                                <h2 class="font-bold text-slate-800 text-sm" x-text="currentTemplate?.name"></h2>
                                <p class="text-xs text-slate-400" x-text="currentTemplate?.desc"></p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button @click="showVersionModal = true" class="px-3 py-1.5 text-xs font-medium text-slate-600 border border-gray-300 rounded hover:bg-slate-100 transition-colors flex items-center gap-1">
                                <i class="fas fa-history"></i> 版本历史
                            </button>
                            <button @click="saveTemplate()" class="px-4 py-1.5 text-xs font-medium text-white bg-sky-500 hover:bg-sky-600 rounded shadow-sm transition-colors flex items-center gap-1">
                                <i class="fas fa-save"></i> 保存新版本
                            </button>
                        </div>
                    </div>

                    <!-- Variables Info -->
                    <div class="px-4 py-2 border-b border-gray-100 bg-slate-50/50 flex items-center gap-2 flex-wrap">
                        <span class="text-[10px] font-semibold text-slate-400 uppercase">注入变量：</span>
                        <template x-for="v in currentTemplate?.variables || []" :key="v">
                            <code class="px-1.5 py-0.5 bg-purple-50 text-purple-600 rounded text-[10px] font-mono border border-purple-100" x-text="'{{' + v + '}}'"></code>
                        </template>
                    </div>

                    <!-- Editor -->
                    <div class="flex-1 flex">
                        <div class="w-12 bg-slate-50 border-r border-gray-200 text-right py-4 pr-3 text-xs text-slate-400 code-font select-none flex flex-col gap-1.5" id="prompt-line-numbers"></div>
                        <textarea id="prompt-editor" x-model="editorContent" @input="updateLineNumbers()" class="flex-1 p-4 resize-none outline-none text-sm code-font text-slate-700 leading-relaxed bg-transparent" spellcheck="false" style="line-height: 1.625rem;"></textarea>
                    </div>

                    <!-- Token Budget -->
                    <div class="px-4 py-2.5 border-t border-gray-200 bg-slate-50 flex items-center justify-between text-xs text-slate-500">
                        <div class="flex items-center gap-4">
                            <span>Token 预算上限：<strong class="text-slate-700 font-mono" x-text="currentTemplate?.tokenBudget + ' tokens'"></strong></span>
                            <span>当前预估：<strong class="text-sky-600 font-mono" x-text="estimatedTokens + ' tokens'"></strong></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-24 bg-slate-200 rounded-full h-1.5">
                                <div class="h-full rounded-full transition-all" :class="estimatedTokens > currentTemplate?.tokenBudget ? 'bg-red-500' : 'bg-sky-500'" :style="'width: ' + Math.min(100, (estimatedTokens / currentTemplate?.tokenBudget) * 100) + '%'"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <a href="https://deerflow.tech" target="_blank" class="deerflow-badge">Created By Deerflow</a>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('promptApp', () => ({
                toast: { show: false, message: '', type: 'success' },
                showVersionModal: false,
                currentId: 'sql_gen',
                editorContent: '',

                templates: [
                    { id: 'sql_gen', name: 'sql_generation', desc: '生成 SQL 的主 Prompt', version: 3, tokenBudget: 4000, variables: ['question', 'schema', 'skills_md', 'field_confidence', 'few_shot_templates', 'conversationHistory', 'error_message'],
                      content: '你是一个 SQL 专家。请根据以下数据库 Schema 和业务知识，将用户的自然语言问题转换为精确的 SQL 查询。\n\n## 数据库 Schema\n{{schema}}\n\n## 业务知识 (skills.md)\n{{skills_md}}\n\n## 字段可信度\n{{field_confidence}}\n\n## 用户问题\n{{question}}\n\n## 要求\n1. 仅生成 SELECT 语句\n2. 优先使用高可信字段\n3. 废弃字段绝对禁止使用\n4. 如有历史对话，请参考上下文' },
                    { id: 'chart_gen', name: 'chart_generation', desc: '生成 Echarts 图表配置', version: 2, tokenBudget: 2000, variables: ['question', 'sql', 'data_preview', 'column_types'],
                      content: '根据以下查询结果，生成一个合适的 Echarts 图表配置。\n\n## 用户问题\n{{question}}\n\n## 执行的 SQL\n{{sql}}\n\n## 数据预览（前 20 行）\n{{data_preview}}\n\n## 列类型\n{{column_types}}\n\n请返回完整的 Echarts Option JSON。' },
                    { id: 'intent_recog', name: 'intent_recognition', desc: '识别用户查询意图', version: 1, tokenBudget: 1500, variables: ['question', 'conversationHistory'],
                      content: '分析以下用户问题，提取时间范围、维度、指标和筛选条件。\n\n## 用户问题\n{{question}}\n\n## 历史对话\n{{conversationHistory}}\n\n返回 JSON 格式：{"time_range": "", "dimensions": [], "metrics": [], "filters": []}' },
                    { id: 'schema_retrieval', name: 'schema_retrieval_query', desc: '改写为检索查询', version: 1, tokenBudget: 1000, variables: ['question', 'conversationHistory'],
                      content: '将以下自然语言问题改写为适合向量检索的查询文本，保留关键业务术语。\n\n## 用户问题\n{{question}}\n\n返回改写后的查询文本。' }
                ],

                get currentTemplate() {
                    return this.templates.find(t => t.id === this.currentId);
                },

                get estimatedTokens() {
                    return Math.ceil((this.editorContent || '').length * 0.4);
                },

                get versions() {
                    if (!this.currentTemplate) return [];
                    const v = this.currentTemplate.version;
                    const result = [];
                    for (let i = v; i >= 1; i--) {
                        result.push({ version: i, isActive: i === v, time: `2026-04-${30 - (v - i)}`, author: i === v ? 'Admin' : '分析师A' });
                    }
                    return result;
                },

                init() {
                    this.editorContent = this.currentTemplate?.content || '';
                    this.$watch('currentId', () => {
                        this.editorContent = this.currentTemplate?.content || '';
                        this.$nextTick(() => this.updateLineNumbers());
                    });
                    this.$nextTick(() => this.updateLineNumbers());
                },

                selectTemplate(id) {
                    this.currentId = id;
                },

                saveTemplate() {
                    if (this.currentTemplate) {
                        this.currentTemplate.content = this.editorContent;
                        this.currentTemplate.version++;
                    }
                    this.showToast('已保存新版本 v' + this.currentTemplate.version, 'success');
                },

                viewVersion(v) {
                    this.showToast('正在加载 v' + v.version + ' 版本内容...', 'info');
                    // 原型阶段：模拟加载历史版本内容
                    this.showVersionModal = false;
                },

                rollbackVersion(v) {
                    if (confirm('确认回滚到 v' + v.version + '？当前未保存的修改将丢失。')) {
                        if (this.currentTemplate) {
                            this.currentTemplate.version = v.version;
                        }
                        this.editorContent = this.currentTemplate?.content || '';
                        this.showVersionModal = false;
                        this.showToast('已回滚到 v' + v.version, 'success');
                        this.$nextTick(() => this.updateLineNumbers());
                    }
                },

                updateLineNumbers() {
                    const linesCount = (this.editorContent || '').split('\n').length;
                    const el = document.getElementById('prompt-line-numbers');
                    if (!el) return;
                    let html = '';
                    for (let i = 1; i <= Math.max(15, linesCount); i++) html += `<span>${i}</span>`;
                    el.innerHTML = html;
                },

                showToast(message, type = 'success') {
                    this.toast = { show: true, message, type };
                    setTimeout(() => { this.toast.show = false; }, 3000);
                }
            }));
        });
    </script>
</body>
</html>
